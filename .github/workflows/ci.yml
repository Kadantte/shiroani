name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # skip husky install on CI
  HUSKY: 0

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' || steps.filter.outputs.desktop == 'true' || steps.filter.outputs.bot == 'true' }}
      web: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' }}
      desktop: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.desktop == 'true' }}
      bot: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.bot == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
            ci:
              - '.github/**'
              - 'scripts/set-version-ci.sh'
              - 'scripts/bump-version.mjs'
            shared:
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
            desktop:
              - 'apps/desktop/**'
            bot:
              - 'apps/bot/**'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Type Check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Generate Prisma client
        run: pnpm --filter @shiroani/bot run db:generate

      - name: Type check
        run: pnpm typecheck

  test-web:
    name: Test Web
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Run web tests
        run: pnpm --filter @shiroani/web test

  test-desktop:
    name: Test Desktop
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Run desktop tests
        run: pnpm --filter @shiroani/desktop test

  test-bot:
    name: Test Bot
    needs: [changes]
    if: needs.changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Generate Prisma client
        run: pnpm --filter @shiroani/bot run db:generate

      - name: Run bot tests
        run: pnpm --filter @shiroani/bot test

  ci-result:
    name: CI Result
    if: always()
    needs: [lint, typecheck, test-web, test-desktop, test-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI outcome
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
