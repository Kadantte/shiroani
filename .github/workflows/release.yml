name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:packages

      - name: Build web frontend
        run: pnpm --filter @shiroani/web build

      - name: Build desktop app
        run: pnpm --filter @shiroani/desktop build

      - name: Package and publish
        run: pnpm --filter @shiroani/desktop exec electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable code signing auto-discovery — only sign when secrets are configured
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if prerelease
        id: prerelease
        run: |
          if echo "${{ steps.tag.outputs.tag }}" | grep -qE '(alpha|beta|rc)'; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        run: gh release edit ${{ steps.tag.outputs.tag }} --draft=false ${{ steps.prerelease.outputs.flag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
