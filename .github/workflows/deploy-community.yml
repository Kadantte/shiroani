name: Deploy Community Server

on:
  push:
    branches: [master]
    paths:
      - 'apps/community/**'
      - 'packages/shared/**'
      - 'Dockerfile.community'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy-community-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      community: ${{ steps.filter.outputs.community }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            community:
              - 'apps/community/**'
              - 'packages/shared/**'
              - 'Dockerfile.community'
              - 'pnpm-lock.yaml'

  build-and-push:
    name: Build & Push Image
    needs: [changes]
    if: needs.changes.outputs.community == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.community
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shiroani-community:latest
            ghcr.io/${{ github.repository_owner }}/shiroani-community:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
