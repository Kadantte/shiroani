<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"
    />
    <title>Menu</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        font-family:
          'Segoe UI',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .menu {
        background: rgba(20, 20, 30, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 107, 138, 0.3);
        border-radius: 12px;
        padding: 6px 0;
        min-width: 200px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 0 16px rgba(255, 107, 138, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        opacity: 0;
        transform: scale(0.96) translateY(-4px);
        transition:
          opacity 120ms ease,
          transform 120ms ease;
      }

      .menu.show {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      .menu-item {
        display: flex;
        align-items: center;
        padding: 8px 14px;
        color: #e8e8f0;
        font-size: 13px;
        cursor: pointer;
        transition: background 150ms ease;
        gap: 10px;
        position: relative;
      }

      .menu-item:hover {
        background: rgba(255, 107, 138, 0.15);
      }

      .menu-item:active {
        background: rgba(255, 107, 138, 0.25);
      }

      .menu-item .icon {
        width: 18px;
        text-align: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      .menu-item .label {
        flex: 1;
      }

      .menu-item .check {
        font-size: 12px;
        color: #ff6b8a;
        opacity: 0;
        transition: opacity 150ms ease;
      }

      .menu-item .check.active {
        opacity: 1;
      }

      .separator {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 4px 10px;
      }

      .menu-item.quit .label {
        color: #cc3355;
      }

      .menu-item.quit:hover {
        background: rgba(204, 51, 85, 0.15);
      }

      .menu-item.open-app .label {
        color: #ff6b8a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="menu" id="menu">
      <div class="menu-item open-app" data-action="open-app">
        <span class="icon">&#x1F4FA;</span>
        <span class="label">Otworz ShiroAni</span>
      </div>
      <div class="separator"></div>
      <div class="menu-item" data-action="navigate:schedule">
        <span class="icon">&#x1F4C5;</span>
        <span class="label">Plan</span>
      </div>
      <div class="menu-item" data-action="navigate:library">
        <span class="icon">&#x1F4DA;</span>
        <span class="label">Biblioteka</span>
      </div>
      <div class="separator"></div>
      <div class="menu-item" data-action="lock-position" id="lockItem">
        <span class="icon">&#x1F512;</span>
        <span class="label">Zablokuj pozycje</span>
        <span class="check" id="lockCheck">&#x2713;</span>
      </div>
      <div class="separator"></div>
      <div class="menu-item" data-action="toggle-visibility" id="visibilityItem">
        <span class="icon" id="visibilityIcon">&#x1F441;</span>
        <span class="label" id="visibilityLabel">Ukryj maskotke</span>
      </div>
      <div class="menu-item" data-action="navigate:settings">
        <span class="icon">&#x2699;</span>
        <span class="label">Ustawienia</span>
      </div>
      <div class="separator"></div>
      <div class="menu-item quit" data-action="quit">
        <span class="icon">&#x2715;</span>
        <span class="label">Zamknij</span>
      </div>
    </div>

    <script>
      (function () {
        var menu = document.getElementById('menu');
        var lockCheck = document.getElementById('lockCheck');
        var visibilityLabel = document.getElementById('visibilityLabel');
        var visibilityIcon = document.getElementById('visibilityIcon');

        var currentState = { visible: true, positionLocked: false };

        function updateUI(state) {
          currentState = state;

          // Update lock checkmark
          if (state.positionLocked) {
            lockCheck.classList.add('active');
          } else {
            lockCheck.classList.remove('active');
          }

          // Update visibility toggle text
          if (state.visible) {
            visibilityLabel.textContent = 'Ukryj maskotke';
            visibilityIcon.textContent = '\uD83D\uDC41';
          } else {
            visibilityLabel.textContent = 'Pokaz maskotke';
            visibilityIcon.textContent = '\uD83D\uDC41';
          }
        }

        // Listen for state updates from main process
        window.menuAPI.onStateUpdate(function (state) {
          updateUI(state);
          // Show the menu with animation
          requestAnimationFrame(function () {
            menu.classList.add('show');
          });
        });

        // Handle menu item clicks
        menu.addEventListener('click', function (e) {
          var item = e.target.closest('.menu-item');
          if (!item) return;

          var action = item.dataset.action;
          if (!action) return;

          // Handle toggle-visibility specially
          if (action === 'toggle-visibility') {
            action = currentState.visible ? 'hide' : 'show';
          }

          window.menuAPI.selectItem(action);
        });

        // Hide animation class when menu is about to be hidden
        // (The main process hides the BrowserWindow)

        // Signal ready
        window.menuAPI.ready();
      })();
    </script>
  </body>
</html>
