<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1323" />
    <!--
      Fallback Content-Security-Policy delivered via <meta> tag.
      The authoritative CSP is set by the main process in `setupContentSecurityPolicy`
      (apps/desktop/src/main/window.ts) via `webRequest.onHeadersReceived`. This
      meta tag is a defence-in-depth fallback in case the header filter ever misses
      a packaged URL form (e.g. file:///C:/... on Windows) or the renderer is loaded
      in a context that doesn't match the filter. `connect-src` is intentionally
      permissive here (localhost + https:) because the exact backend port is only
      known at runtime — the header-based CSP has the precise allowlist.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: shiroani-bg: https:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:* http://127.0.0.1:* ws://127.0.0.1:* https://graphql.anilist.co; object-src 'none'; frame-src 'self' https:; media-src 'self' https: blob:; form-action 'self'; base-uri 'self'"
    />
    <title>ShiroAni</title>

    <!-- Typography is bundled via @fontsource packages imported in main.tsx.
         This avoids CSP constraints against fonts.googleapis.com / gstatic.com
         and lets the app render correctly offline. -->

    <style>
      /* Base style — overridden by inline theme script below */
      html {
        background-color: transparent;
      }
    </style>
    <script>
      // Apply persisted theme class and background BEFORE React mounts to prevent flicker.
      // The DARK_THEMES / LIGHT_THEMES arrays are injected at build time by themeInjectionPlugin
      // (vite.config.ts) from packages/shared/src/types/settings.ts (single source of truth).
      (function () {
        try {
          var theme = localStorage.getItem('shiroani-theme') || 'plum';
          document.documentElement.classList.add(theme);
          var darkThemes = __DARK_THEMES__;
          var lightThemes = __LIGHT_THEMES__;
          var isLight = lightThemes.indexOf(theme) !== -1;
          // Unknown themes (e.g. custom themes not yet loaded, or legacy IDs)
          // fall through to the dark Plum background — React reconciles after mount.
          document.documentElement.style.backgroundColor = isLight ? '#f4f1ea' : '#1a1323';
        } catch (e) {
          console.error('Failed to apply initial theme from localStorage:', e);
        }
      })();
    </script>
  </head>
  <body class="viewport-noise">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
