services:
  postgres:
    image: postgres:17-alpine
    container_name: shiroani-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shiroani
      POSTGRES_PASSWORD: shiroani
      POSTGRES_DB: shiroani_bot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shiroani-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
